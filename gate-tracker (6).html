<script>
/* =========================================================
   GLOBAL CONSTANTS (must be defined before any function below
   that references them runs, since const has no hoisting)
========================================================= */
const IST_TIMEZONE = "Asia/Kolkata";

/* =========================================================
   CONFIG
========================================================= */
const CORE_TASK_DEFS = [
  { id: "revision",  icon: "book-open",    label: "Today's Revision",    targetMinutes: 60  }, // default target, user-editable
  { id: "practice",  icon: "pencil-line",  label: "Practice Questions",  targetMinutes: 120 },
  { id: "lecture",   icon: "clapperboard", label: "Lecture",             targetMinutes: 180 },
  { id: "pyqs",      icon: "file-text",    label: "PYQs (Past Year Qs)", targetMinutes: 60  },
  { id: "aptitude",  icon: "calculator",   label: "Aptitude",            targetMinutes: 45  },
];

const SYLLABUS = {
  CS: {
    "Engineering Mathematics": ["Discrete Math", "Linear Algebra", "Calculus", "Probability & Statistics"],
    "Digital Logic": ["Boolean Algebra", "Combinational Circuits", "Sequential Circuits", "Number Representation"],
    "Computer Organization & Architecture": ["Machine Instructions", "ALU & Datapath", "Pipelining", "Memory Hierarchy", "I/O Interface"],
    "Programming & Data Structures": ["C Programming", "Arrays & Stacks", "Trees & Graphs", "Linked Lists", "Recursion"],
    "Algorithms": ["Asymptotic Analysis", "Sorting & Searching", "Greedy Algorithms", "DP", "Graph Algorithms"],
    "Theory of Computation": ["Regular Languages & FA", "Context-Free Languages & PDA", "Turing Machines", "Undecidability"],
    "Compiler Design": ["Lexical Analysis", "Parsing", "Syntax-Directed Translation", "Code Optimization"],
    "Operating Systems": ["Processes & Threads", "Scheduling", "Synchronization", "Memory Management", "File Systems"],
    "Databases": ["ER Model", "Relational Algebra", "SQL", "Normalization", "Transactions & Concurrency"],
    "Computer Networks": ["OSI/TCP-IP Layers", "Routing", "Congestion Control", "Application Layer Protocols"],
  },
  DA: {
    "Linear Algebra": ["Matrices & Determinants", "Eigenvalues/Eigenvectors", "Vector Spaces", "System of Equations"],
    "Calculus & Optimization": ["Limits & Continuity", "Gradient & Hessian", "Convex Optimization", "Lagrange Multipliers"],
    "Probability & Statistics": ["Random Variables", "Distributions", "Hypothesis Testing", "Bayesian Inference"],
    "Programming, DS & Algorithms": ["Python Programming", "Data Structures", "Sorting & Searching", "Complexity Analysis"],
    "Database Management & Warehousing": ["SQL", "Normalization", "ETL Concepts", "OLAP vs OLTP"],
    "Machine Learning": ["Regression", "Classification", "Clustering", "SVM & Decision Trees", "Model Evaluation"],
    "AI": ["Search Algorithms", "Knowledge Representation", "Logic & Reasoning", "Neural Network Basics"],
    "Deep Learning": ["Feedforward Networks", "CNNs", "RNNs/LSTMs", "Backpropagation"],
    "Data Science Tools": ["Pandas/Numpy", "Data Visualization", "Feature Engineering", "Data Cleaning"],
  },
};

const EXAMS = ["CS", "DA"];
let currentExam = "CS";

/* =========================================================
   STATE
========================================================= */
function dailyKey(exam)   { return `gateTracker_daily_${exam}`; }
function subjectKey(exam) { return `gateTracker_subjects_${exam}`; }

function defaultDailyState() {
  const core = {};
  CORE_TASK_DEFS.forEach(t => { core[t.id] = { minutes: 0 }; });
  return { core, custom: [], streak: 0, lastCompletedDate: null, lastResetAt: null, activeDate: todayStrIST() };
}

function loadDailyState(exam) {
  try {
    const raw = localStorage.getItem(dailyKey(exam));
    const base = defaultDailyState();
    if (!raw) return base;
    const parsed = JSON.parse(raw);
    return {
      core: Object.assign(base.core, parsed.core || {}),
      custom: Array.isArray(parsed.custom) ? parsed.custom : [],
      streak: typeof parsed.streak === "number" ? parsed.streak : 0,
      lastCompletedDate: parsed.lastCompletedDate || null,
      lastResetAt: parsed.lastResetAt || null,
      activeDate: parsed.activeDate || base.activeDate,
    };
  } catch (e) { return defaultDailyState(); }
}

function saveDailyState(exam, state) {
  localStorage.setItem(dailyKey(exam), JSON.stringify(state));
}

function defaultSubjectState(exam) {
  const data = {};
  Object.entries(SYLLABUS[exam]).forEach(([subject, topics]) => {
    data[subject] = topics.map(() => false);
  });
  return data;
}

function loadSubjectState(exam) {
  try {
    const raw = localStorage.getItem(subjectKey(exam));
    const base = defaultSubjectState(exam);
    if (!raw) return base;
    const parsed = JSON.parse(raw);
    Object.keys(base).forEach(subject => {
      if (Array.isArray(parsed[subject])) {
        base[subject] = base[subject].map((v, i) => parsed[subject][i] ?? v);
      }
    });
    return base;
  } catch (e) { return defaultSubjectState(exam); }
}

function saveSubjectState(exam, data) {
  localStorage.setItem(subjectKey(exam), JSON.stringify(data));
}

/* ---------------------------------------------------------
   EDITABLE TARGETS — each core task's target minutes can be
   customized per exam and persists independently of daily resets.
--------------------------------------------------------- */
function targetKey(exam) { return `gateTracker_targets_${exam}`; }

function defaultTargets() {
  const t = {};
  CORE_TASK_DEFS.forEach(def => { t[def.id] = def.targetMinutes; });
  return t;
}

function loadTargets(exam) {
  try {
    const raw = localStorage.getItem(targetKey(exam));
    const base = defaultTargets();
    if (!raw) return base;
    const parsed = JSON.parse(raw);
    Object.keys(base).forEach(id => {
      if (typeof parsed[id] === "number" && parsed[id] > 0) base[id] = parsed[id];
    });
    return base;
  } catch (e) { return defaultTargets(); }
}

function saveTargets(exam, data) {
  localStorage.setItem(targetKey(exam), JSON.stringify(data));
}

let targetState = loadTargets(currentExam);

function getTarget(id) {
  return targetState[id] || CORE_TASK_DEFS.find(d => d.id === id)?.targetMinutes || 1;
}

/* ---------------------------------------------------------
   DAILY HISTORY — separate "folder" (its own localStorage key)
   storing a snapshot of every completed/passed day per exam.
--------------------------------------------------------- */
function historyKey(exam) { return `gateTracker_history_${exam}`; }

function loadHistory(exam) {
  try {
    const raw = localStorage.getItem(historyKey(exam));
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}

function saveHistory(exam, historyArr) {
  // keep most recent 120 days to avoid unbounded growth
  const trimmed = historyArr.slice(-120);
  localStorage.setItem(historyKey(exam), JSON.stringify(trimmed));
}

function buildHistorySnapshot(exam, snapshotState) {
  const totalTargetMinutes = CORE_TASK_DEFS.reduce((s, t) => s + getTarget(t.id), 0);
  const loggedMinutes = CORE_TASK_DEFS.reduce((s, t) => s + Math.min(snapshotState.core[t.id]?.minutes || 0, getTarget(t.id)), 0);
  const coreFraction = totalTargetMinutes ? (loggedMinutes / totalTargetMinutes) : 0;
  const customTotal = snapshotState.custom.length;
  const customDone = snapshotState.custom.filter(t => t.done).length;
  const customFraction = customTotal ? (customDone / customTotal) : null;
  let overallFraction;
  if (customFraction === null) overallFraction = coreFraction;
  else {
    const coreCount = CORE_TASK_DEFS.length;
    overallFraction = ((coreFraction * coreCount) + (customFraction * customTotal)) / (coreCount + customTotal);
  }
  return {
    date: snapshotState.activeDate,
    pct: Math.round(overallFraction * 100),
    loggedMinutes,
    totalTargetMinutes,
    customDone,
    customTotal,
    allDone: snapshotState.lastCompletedDate === snapshotState.activeDate,
  };
}

// If the stored daily state belongs to a previous calendar day (IST), archive it into
// history, then start a fresh day (core minutes + custom tasks reset, streak preserved).
function archiveDayIfRolledOver(exam, state) {
  const today = todayStrIST();
  if (state.activeDate === today) return state;

  const hasAnyData = Object.values(state.core).some(c => c.minutes > 0) || state.custom.length > 0;
  if (hasAnyData) {
    const snapshot = buildHistorySnapshot(exam, state);
    const history = loadHistory(exam);
    history.push(snapshot);
    saveHistory(exam, history);
  }

  CORE_TASK_DEFS.forEach(t => { state.core[t.id] = { minutes: 0 }; });
  state.custom = [];
  state.activeDate = today;
  saveDailyState(exam, state);
  return state;
}

let dailyState = loadDailyState(currentExam);
let subjectState = loadSubjectState(currentExam);

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function formatMinutes(m) {
  if (m % 60 === 0) return (m/60) + "h";
  if (m < 60) return m + "m";
  return Math.floor(m/60) + "h " + (m%60) + "m";
}

/* =========================================================
   RENDER: CORE TASKS  (event delegation — fixes click bug)
========================================================= */
const coreTaskList = document.getElementById("coreTaskList");

function renderCoreTasks() {
  coreTaskList.innerHTML = "";
  CORE_TASK_DEFS.forEach(def => {
    const entry = dailyState.core[def.id] || { minutes: 0 };
    const target = getTarget(def.id);
    const pct = Math.min(100, Math.round((entry.minutes / target) * 100)) || 0;
    const isComplete = entry.minutes >= target;

function refreshCoreRow(id) {

coreTaskList.addEventListener("click", (e) => {

  if (toggleBtn) {
    const id = toggleBtn.getAttribute("data-id");
    const target = getTarget(id);
    const entry = dailyState.core[id];
    entry.minutes = entry.minutes >= target ? 0 : target;
    saveDailyState(currentExam, dailyState);
    refreshCoreRow(id);
    updateStats();
    return;
  }

  if (editBtn) {
    const id = editBtn.getAttribute("data-id");
    const def = CORE_TASK_DEFS.find(t => t.id === id);

    const input = prompt(`Set new target (in minutes) for "${def.label}":`, String(current));

coreTaskList.addEventListener("input", (e) => {

function refreshSubjectCard(subject) {
  const topics = SYLLABUS[currentExam][subject];
  const checks = subjectState[subject];
  const doneCount = checks.filter(Boolean).length;
  const pct = topics.length ? Math.round((doneCount / topics.length) * 100) : 0;
  const card = subjectList.querySelector(`[data-subject="${CSS.escape(subject)}"]`);
  if (!card) return;

  card.querySelectorAll('[data-action="toggle-topic"]').forEach((btn, i) => {
    const checked = checks[i];
    btn.className = `w-5 h-5 rounded-md border-2 flex items-center justify-center shrink-0 transition-colors ${checked ? "bg-success border-success" : "border-border"}`;
    btn.innerHTML = checked ? '<i data-lucide="check" class="w-3.5 h-3.5 text-success-foreground"></i>' : "";
    const label = btn.nextElementSibling;
    label.className = `text-sm ${checked ? "line-through text-muted-foreground" : ""}`;
  });

  const countLabel = card.querySelector(".font-mono.text-muted-foreground");
  if (countLabel) countLabel.textContent = `${doneCount}/${topics.length}`;
  const pctLabel = card.querySelectorAll(".font-mono")[1];
  if (pctLabel) {
    pctLabel.textContent = pct + "%";
    pctLabel.className = `text-xs font-mono font-semibold ${pct === 100 ? "text-success" : "text-primary"}`;
  }
  const bar = card.querySelector(".h-1 > div");
  if (bar) {
    bar.style.width = pct + "%";
    bar.className = `h-full ${pct === 100 ? "bg-success" : "bg-primary"} transition-all duration-300`;
  }
  lucide.createIcons();
}

subjectList.addEventListener("click", (e) => {
  const topicBtn = e.target.closest('[data-action="toggle-topic"]');
  const openBtn = e.target.closest('[data-action="toggle-subject-open"]');

  if (topicBtn) {
    const subject = decodeURIComponent(topicBtn.getAttribute("data-subject"));
    const index = parseInt(topicBtn.getAttribute("data-index"), 10);
    subjectState[subject][index] = !subjectState[subject][index];
    saveSubjectState(currentExam, subjectState);
    refreshSubjectCard(subject);
    updateSubjectOverall();
    return;

  if (openBtn) {
    const card = openBtn.closest("[data-subject]");
    const panel = card.querySelector(".subject-topics");
    const chevron = card.querySelector(".subject-chevron");
    panel.classList.toggle("hidden");

function updateSubjectOverall() {
  const subjects = SYLLABUS[currentExam];
  let totalTopics = 0, doneTopics = 0;
  Object.entries(subjects).forEach(([subject, topics]) => {
    totalTopics += topics.length;
    doneTopics += (subjectState[subject] || []).filter(Boolean).length;
  });
  const pct = totalTopics ? Math.round((doneTopics / totalTopics) * 100) : 0;
  document.getElementById("subjectOverallPct").textContent = pct + "%";
  document.getElementById("subjectOverallBar").style.width = pct + "%";
}

/* =========================================================
   STATS / DAILY PROGRESS
========================================================= */
function computeDailyProgress() {
  const totalTargetMinutes = CORE_TASK_DEFS.reduce((s, t) => s + getTarget(t.id), 0);
  const loggedMinutes = CORE_TASK_DEFS.reduce((s, t) => s + Math.min(dailyState.core[t.id].minutes, getTarget(t.id)), 0);
  const coreFraction = totalTargetMinutes ? (loggedMinutes / totalTargetMinutes) : 0;

  const customTotal = dailyState.custom.length;
  const customDone = dailyState.custom.filter(t => t.done).length;
  const customFraction = customTotal ? (customDone / customTotal) : null;

  let overallFraction;
  if (customFraction === null) {
    overallFraction = coreFraction;
  } else {
    const coreCount = CORE_TASK_DEFS.length;
    overallFraction = ((coreFraction * coreCount) + (customFraction * customTotal)) / (coreCount + customTotal);
  }

  const totalTasks = CORE_TASK_DEFS.length + customTotal;
  const allCoreDone = CORE_TASK_DEFS.every(t => dailyState.core[t.id].minutes >= getTarget(t.id));
  const allCustomDone = dailyState.custom.every(t => t.done);
  const allDone = allCoreDone && allCustomDone && totalTasks > 0;

  return { pct: Math.round(overallFraction * 100), totalTasks, allDone };
}

function updateStats() {
  const { pct, totalTasks, allDone } = computeDailyProgress();
  document.getElementById("statTotal").textContent = totalTasks;
  document.getElementById("statProgress").textContent = pct + "%";
  document.getElementById("statStreak").textContent = dailyState.streak;
  document.getElementById("barPercent").textContent = pct + "%";
  document.getElementById("barFill").style.width = pct + "%";

  if (allDone) {
    const today = todayStrIST();
    if (dailyState.lastCompletedDate !== today) {
      dailyState.streak += 1;
      dailyState.lastCompletedDate = today;
      saveDailyState(currentExam, dailyState);
      document.getElementById("statStreak").textContent = dailyState.streak;
      showMotivationalQuote();
    }
  }
}

    btn.className = `exam-tab flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all flex items-center justify-center gap-2 ${
      active ? "bg-primary text-primary-foreground shadow-sm" : "text-muted-foreground hover:bg-secondary"
    }`;
  });

  renderCoreTasks();
  renderCustomTasks();
  renderSubjects();
  updateHistoryPreviewLabel();
  updateStats();
  updateLastResetNote();
}

document.querySelectorAll(".exam-tab").forEach(btn => {
  btn.addEventListener("click", () => switchExam(btn.getAttribute("data-exam")));
});

/* =========================================================
   THEME
========================================================= */
function setThemeIcon() {
  const isDark = document.documentElement.classList.contains("dark");
  const iconEl = document.getElementById("themeIcon");
  if (!iconEl) return;
  // Show a SUN when in dark mode (tap to switch to light), a MOON when in light mode (tap to switch to dark)
  iconEl.setAttribute("data-lucide", isDark ? "sun" : "moon");
  lucide.createIcons();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains("dark");
  if (isDark) {
    html.classList.remove("dark");
    localStorage.setItem("gateTrackerTheme", "light");
  } else {
    html.classList.add("dark");
    localStorage.setItem("gateTrackerTheme", "dark");
  }
  setThemeIcon();
}

function loadTheme() {
  const saved = localStorage.getItem("gateTrackerTheme");
  if (saved === "dark") document.documentElement.classList.add("dark");
  else if (saved === "light") document.documentElement.classList.remove("dark");
  else if (window.matchMedia("(prefers-color-scheme: dark)").matches) document.documentElement.classList.add("dark");
  setThemeIcon();
}

document.getElementById("themeToggle").addEventListener("click", toggleTheme);

/* =========================================================
   INIT
========================================================= */
function updateLiveClockAndDate() {
  const now = new Date();

  const dateStr = now.toLocaleDateString("en-IN", {
    timeZone: IST_TIMEZONE,
    weekday: "long", year: "numeric", month: "long", day: "numeric"
  });
  const timeStr = now.toLocaleTimeString("en-IN", {
    timeZone: IST_TIMEZONE,
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true
  });

  const dateEl = document.getElementById("todayDate");
  if (dateEl) dateEl.textContent = dateStr;

  const clockEl = document.getElementById("liveClock");
  if (clockEl) clockEl.textContent = timeStr;

  const clockElMobile = document.getElementById("liveClockMobile");
  if (clockElMobile) clockElMobile.textContent = timeStr;
}

// Used for streak / daily-reset date comparisons too, so "today" always means an IST calendar day
function todayStrIST() {
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: IST_TIMEZONE, year: "numeric", month: "2-digit", day: "2-digit"
  }).formatToParts(now);
  const y = parts.find(p => p.type === "year").value;
  const m = parts.find(p => p.type === "month").value;
  const d = parts.find(p => p.type === "day").value;
  return `${y}-${m}-${d}`;
}

window.addEventListener("DOMContentLoaded", () => {
  loadTheme();
  updateLiveClockAndDate();
  setInterval(updateLiveClockAndDate, 1000);
  switchExam("CS");
  lucide.createIcons();
});
</script>
